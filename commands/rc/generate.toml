prompt = """\nThe user wants to generate a minimal MCP server for Rocket.Chat.\nTheir specific request is: {{args}}\n\n1. First, call rc_suggest_endpoints with the FULL user intent to get multi-cluster results covering all functional areas.\n2. Review the clusters — if any parts of the intent are not covered, use rc_search_endpoints to find the missing endpoints.\n3. Also call rc_list_workflows to check if predefined workflow compositions match the intent — these produce higher-level tools instead of raw API wrappers.\n4. Recommend the minimal combined set of endpoints and/or workflows. Explain what each one does in plain language.\n5. Ask the user to confirm the endpoint/workflow list.\n6. Once confirmed, collect ALL of the following in one step (use friendly, non-technical language):\n   - Output directory (where to save the server, e.g., ~/my-rc-bot)\n   - Rocket.Chat server URL (e.g., https://chat.example.com)\n   - Auth Token (explain: find in RC → My Account → Personal Access Tokens)\n   - User ID (shown alongside the auth token)\n7. Call rc_generate_server with the confirmed endpoints, workflows, AND all credentials. NEVER call generate without rcUrl, rcAuthToken, and rcUserId.\n"""
